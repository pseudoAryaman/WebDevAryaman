    <meta charset="utf-8">

    <title>ONE NOTE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        /*.Drawing-Area {
            height: 100vh;

            grid-template-areas:

        .red,
        .blue,
        .green,
        .yellow {
            height: 30px;
            width: 30px;
            border-radius: 50%;
            margin-left: 10px;
        }

        .red {
            background-color: red;
        }

        .blue {
            background-color: blue;
        }

        .yellow {
            background-color: yellow;
        }

        .green {
            background-color: green;
        }

        .colorBox {
            background-color: beige;
            height: 30px;
            width: 100vw;
            display: flex;
            justify-content: center;
        }

        .circle {
            /* background-color: red; */
            height: 6px;
            width: 6px;
            border-radius: 50%;
            position: absolute;
        }

        .Drawing-Area {
            height: 100vh;
            width: 100vw;

        }
    </style>
</head>

<body>
    <div class="colorBox">
        <div class="red" data-color="red"></div>
        <div class="yellow" data-color="yellow"></div>
        <div class="green" data-color="green"></div>
        <div class="blue" data-color="blue"></div>
    </div>
    <div class="Drawing-Area"></div>
    <script>


        let selectedColor = "black";
        const drawarea = document.querySelector(".colorBox");
        drawarea.addEventListener("click", (e) => {
            if (!e.target.dataset.color) return;
            selectedColor = e.target.classList[0];
        })

        const touch = document.querySelector(".Drawing-Area");
        let isDrawing = false;
        touch.addEventListener("mousedown", (e) => {
            isDrawing = true;

        })
        touch.addEventListener("mouseup", () => {
            isDrawing = false;
        })
        touch.addEventListener("mouseleave", () => {
            isDrawing = false;
        })
        touch.addEventListener("mousemove", (e) => {
            if (!isDrawing) return;
            const shape = document.createElement("div");
            shape.classList.add("circle");
            shape.style.backgroundColor = selectedColor;
            shape.style.left = e.clientX - 3 + "px";
            touch.appendChild(shape);
            shape.style.top = e.clientY - 3 + "px";
        })
    </script>
</body>

</html>
